<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Haseł</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #password { margin-top: 10px; font-size: 24px; }
    </style>
</head>
<body>
    <h1>Interaktywny Generator Haseł</h1>
    <label for="length">Długość hasła:</label>
    <input type="number" id="length" value="12" min="1" max="100">
    <button id="generate">Generuj Hasło</button>
    <div id="password"></div>
    <script>
        document.getElementById('generate').onclick = function() {
            const length = document.getElementById('length').value;
            const charset = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()';
            let password = '';
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            document.getElementById('password').innerText = password;
        };
    </script>
</body>
</html>
